  <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подорожі — Головна</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        .head {
            background-color: #2f2f2f;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .menu-links li a {
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .menu-links li a:hover,
        .menu-links li a.active {
            color: #ff6f61;
        }

        .hero {
            height: 540px;
            background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero-info {
            background-color: rgba(0, 0, 0, 0.45);
            padding: 28px 35px;
            border-radius: 4px;
            text-align: center;
            width: 470px;
        }

        .hero-title {
            color: white;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .hero-text {
            color: white;
            font-size: 13px;
            font-weight: 500;
        }

        .footer {
            background-color: #2f2f2f;
            color: white;
            text-align: center;
            font-size: 10px;
            padding: 8px 0;
        }

        @media (max-width: 768px) {
            .hero {
                height: 420px;
                padding: 20px;
            }

            .hero-info {
                width: 90%;
                padding: 22px;
            }

            .hero-title {
                font-size: 22px;
            }

            .hero-text {
                font-size: 12px;
            }

            .menu-links {
                gap: 18px;
            }
        }
    </style>
</head>
<body>

    <header class="head">
        <nav class="menu">
            <ul class="menu-links">
                <li><a href="#" class="active">Головна</a></li>
                <li><a href="#">Напрямки</a></li>
                <li><a href="#">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-info">
            <h1 class="hero-title">Ласкаво просимо до<br>світу подорожей!</h1>
            <p class="hero-text">Відкрийте для себе нові місця та враження.</p>
        </div>
    </section>

    <footer class="footer">
        © 2024 Подорожі. Станіславського Олександра. Всі права захищено.
    </footer>

</body>
</html>
    
  </body>
  
</html>
